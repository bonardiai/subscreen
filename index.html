<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SubScreen — Аксессуары Apple</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f7f7f5;font-family:'Outfit',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh}
.hd{background:#fff;border-bottom:1px solid #e8e8e4;padding:20px 20px 16px}
.hd-logo{font-size:26px;font-weight:700;letter-spacing:-0.5px;color:#111;margin-bottom:4px}
.hd-logo span{color:#1a9e8f}
.hd-tag{font-size:11px;color:#999;letter-spacing:1.5px;text-transform:uppercase}
.hd-contacts{display:flex;flex-wrap:wrap;gap:8px 16px;font-size:12px;color:#888;margin-top:10px}
.hd-contacts a{color:#1a9e8f;text-decoration:none}
.search-bar{padding:12px 20px;background:#fff;border-bottom:1px solid #e8e8e4;position:sticky;top:0;z-index:10}
.search-bar input{width:100%;padding:9px 14px;border:1px solid #e0e0da;border-radius:8px;font-size:13px;font-family:'Outfit',sans-serif;background:#f9f9f7;outline:none;color:#111}
.search-bar input:focus{border-color:#1a9e8f;background:#fff}
.main{max-width:640px;margin:0 auto;padding:20px 16px 60px}
.cat-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:#1a9e8f;margin:24px 0 10px;padding:0 2px}
.cat-label:first-child{margin-top:0}
.card{background:#fff;border:1px solid #e8e8e4;border-radius:12px;margin-bottom:8px;overflow:hidden;cursor:pointer;transition:border-color .2s,box-shadow .15s}
.card:hover{border-color:#ccc;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.card.open{border-color:#1a9e8f}
.card-top{display:flex;align-items:center;gap:12px;padding:12px 16px}
.card-num{font-size:11px;color:#ccc;font-weight:500;min-width:18px;text-align:center}
.card-thumb{width:44px;height:44px;border-radius:8px;background:#f2f2ef;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.card-thumb img{width:100%;height:100%;object-fit:contain}
.card-info{flex:1;min-width:0}
.card-name{font-size:13px;font-weight:500;color:#111;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card.open .card-name{white-space:normal}
.card-sub{font-size:11px;color:#aaa;margin-top:2px}
.card-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.badge{font-size:9px;font-weight:600;padding:2px 6px;border-radius:20px;letter-spacing:.4px}
.badge-new{background:#e6f5f2;color:#1a9e8f}
.badge-top{background:#fff8e6;color:#c8900a}
.chevron{color:#ccc;transition:transform .3s;font-size:16px}
.card.open .chevron{transform:rotate(180deg);color:#1a9e8f}
.card-expanded{max-height:0;overflow:hidden;transition:max-height .4s ease}
.card.open .card-expanded{max-height:900px}
.exp-inner{padding:0 16px 16px}
.photo-area{width:100%;background:#f7f7f5;border-radius:8px;margin-bottom:12px;overflow:hidden;display:flex;align-items:center;justify-content:center;border:1px solid #ebebea;min-height:200px}
.photo-area img{max-width:100%;max-height:320px;object-fit:contain;padding:12px}
.prices-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.pc{background:#f7f7f5;border-radius:8px;padding:10px 6px;text-align:center;border:1px solid #eeeee9}
.pc-lbl{font-size:10px;color:#aaa;margin-bottom:3px}
.pc-val{font-size:17px;font-weight:600;color:#111}
.pc-val .cur{font-size:11px;font-weight:400;color:#aaa}
.det{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0f0ee;font-size:12px}
.det:last-of-type{border-bottom:none}
.det-lbl{color:#aaa}
.det-val{color:#111;font-weight:500}
.order-btn{display:block;width:100%;padding:11px;margin-top:12px;background:#111;color:#fff;font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;border:none;border-radius:8px;cursor:pointer;text-align:center;text-decoration:none;transition:background .2s}
.order-btn:hover{background:#333}
.empty{text-align:center;padding:40px 20px;color:#aaa;font-size:13px}
.footer{text-align:center;font-size:11px;color:#bbb;padding:24px 20px;border-top:1px solid #eeeee9;margin-top:16px}
</style>
</head>

const TIERS = ["от 1–9 шт","от 10–50 шт","от 51–200 шт"];

function getImg(key){ return IMGS[key] || ''; }

function render(filter){
  const cat = document.getElementById("catalog");
  cat.innerHTML = "";
  let num = 0, found = 0;
  DATA.forEach(section => {
    const items = section.items.filter(i =>
      !filter || i.name.toLowerCase().includes(filter) || i.sub.toLowerCase().includes(filter)
    );
    if(!items.length) return;
    found += items.length;
    const lbl = document.createElement("div");
    lbl.className = "cat-label";
    lbl.textContent = section.cat;
    cat.appendChild(lbl);
    items.forEach(item => {
      num++;
      const imgSrc = getImg(item.img);
      const badge = item.badge === "NEW" ? '<span class="badge badge-new">NEW</span>' :
                    item.badge === "ТОП" ? '<span class="badge badge-top">ТОП</span>' : "";
      const prices = TIERS.map((t,i) => {
        const v = item.prices[i];
        return '<div class="pc"><div class="pc-lbl">'+t+'</div><div class="pc-val">'+(v ? v+'<span class="cur"> ₽</span>' : '—')+'</div></div>';
      }).join("");
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML =
        '<div class="card-top">'+
          '<div class="card-num">'+String(num).padStart(2,"0")+'</div>'+
          '<div class="card-thumb"><img src="'+imgSrc+'" alt=""></div>'+
          '<div class="card-info">'+
            '<div class="card-name">'+item.name+'</div>'+
            '<div class="card-sub">'+item.sub+'</div>'+
          '</div>'+
          '<div class="card-right">'+badge+'<div class="chevron">▾</div></div>'+
        '</div>'+
        '<div class="card-expanded">'+
          '<div class="exp-inner">'+
            '<div class="photo-area"><img src="'+imgSrc+'" alt="'+item.name+'"></div>'+
            '<div class="prices-grid">'+prices+'</div>'+
            '<div class="det"><span class="det-lbl">Упаковка</span><span class="det-val">'+item.sub+'</span></div>'+
            '<a class="order-btn" href="https://t.me/dzoter?text='+encodeURIComponent('Здравствуйте! Интересует: '+item.name)+'" target="_blank">Заказать в Telegram →</a>'+
          '</div>'+
        '</div>';
      card.querySelector(".card-top").addEventListener("click", () => {
        const was = card.classList.contains("open");
        document.querySelectorAll(".card.open").forEach(c => c.classList.remove("open"));
        if(!was) card.classList.add("open");
      });
      cat.appendChild(card);
    });
  });
  if(!found) cat.innerHTML = '<div class="empty">Ничего не найдено</div>';
}

render("");
document.getElementById("q").addEventListener("input", e => render(e.target.value.toLowerCase().trim()));
</script>
</body>
